    <title>Casino Online</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #000;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;

            /* CAMBIAR POR TU IMAGEN */
            background: url("images/fondo3.png") center center no-repeat;

            background-size: cover;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .08);
        }

        /* BOTON */

        .whatsapp-btn {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);

            width: min(92%, 430px);
            height: 95px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            text-decoration: none;
            color: white;

            border-radius: 60px;

            background: linear-gradient(180deg,
                    #4eff8f 0%,
                    #0dc84f 100%);

            border: 4px solid rgba(255, 255, 255, .35);

            box-shadow:
                inset 0 4px 8px rgba(255, 255, 255, .35),
                0 0 35px rgba(0, 255, 100, .55);

            z-index: 10;
        }


        .whatsapp-btn::before {
            left: 18px;
        }

        .whatsapp-btn::after {
            right: 18px;
        }

        .whatsapp-btn strong {
            font-size: 2rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: .9;
            text-shadow: 0 2px 4px rgba(0, 0, 0, .4);
        }

        .whatsapp-btn span {
            margin-top: 8px;
            font-size: .95rem;
            font-weight: 700;
        }

        /* MOBILE */

        @media(max-width:480px) {

            .hero {
                background-image: url(images/fondomobile.png);
            }

            .whatsapp-btn {
                height: 125px;
                bottom: 140px;
            }

            .whatsapp-btn strong {
                font-size: 1.6rem;
            }

            .whatsapp-btn span {
                font-size: .8rem;
            }



        }
    </style>
</head>

<body>

    <section class="hero">

        <a href="https://wa.link/597pxe" class="whatsapp-btn">
            <strong>HABLAR POR<br>WHATSAPP</strong>
            <span>Carga minima de $2000 no hay minimo de retiro</span>
        </a>

    </section>

</body>

</html>
